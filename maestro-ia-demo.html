<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Demo IA — Maestro IA Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080b10;
  --surface: #0f1318;
  --surface2: #161c24;
  --border: #1e2733;
  --accent: #00d4ff;
  --green: #00e676;
  --text: #e8edf5;
  --text-muted: #5a6a7e;
  --wa-green: #25d366;
  --wa-out: #005c4b;
  --wa-in: #1a2633;
  --wa-bg: #07101a;
  --wa-header: #182026;
}

* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center;
  padding: 48px 16px 40px;
  overflow-x: hidden;
}

body::before {
  content: '';
  position: fixed; inset: 0;
  background:
    radial-gradient(ellipse 70% 50% at 15% 10%, rgba(0,212,255,0.07) 0%, transparent 55%),
    radial-gradient(ellipse 50% 60% at 85% 90%, rgba(0,230,118,0.05) 0%, transparent 55%),
    radial-gradient(ellipse 40% 30% at 50% 50%, rgba(0,100,180,0.04) 0%, transparent 60%);
  pointer-events: none; z-index: 0;
}

.wrap {
  position: relative; z-index: 1;
  width: 100%; max-width: 480px;
  display: flex; flex-direction: column;
  align-items: center; gap: 24px;
}

.badge {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 13px; border-radius: 100px;
  border: 1px solid rgba(0,212,255,0.2);
  background: rgba(0,212,255,0.05);
  font-family: 'Syne', sans-serif;
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--accent);
}

.badge-dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--green);
  box-shadow: 0 0 6px var(--green);
  animation: blink 2s infinite;
}

@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }

h1 {
  font-family: 'Syne', sans-serif;
  font-size: clamp(28px, 7vw, 40px);
  font-weight: 800; line-height: 1.08;
  text-align: center; letter-spacing: -0.02em;
}

h1 em {
  font-style: normal;
  background: linear-gradient(120deg, var(--accent) 0%, var(--green) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

.sub {
  font-size: 14px; color: var(--text-muted);
  line-height: 1.65; text-align: center; max-width: 340px;
}

.sector-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 7px; width: 100%;
}

.extra-row {
  grid-column: 1 / -1;
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 7px;
}

.s-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 4px;
  padding: 10px 6px; border-radius: 12px;
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text-muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  cursor: pointer; transition: all 0.18s ease;
  text-align: center; line-height: 1.2;
}

.s-btn .icon { font-size: 20px; }

.s-btn:hover {
  border-color: var(--accent); color: var(--text);
  background: rgba(0,212,255,0.06);
  transform: translateY(-1px);
}

.s-btn.active {
  border-color: var(--accent);
  background: rgba(0,212,255,0.1);
  color: var(--accent);
  box-shadow: 0 0 0 1px rgba(0,212,255,0.15), 0 4px 16px rgba(0,212,255,0.08);
}

.phone {
  width: 100%; max-width: 400px;
  background: var(--wa-bg);
  border-radius: 20px; overflow: hidden;
  border: 1px solid var(--border);
  box-shadow:
    0 0 0 1px rgba(0,212,255,0.06),
    0 40px 100px rgba(0,0,0,0.7),
    0 0 80px rgba(0,212,255,0.04);
  transition: box-shadow 0.4s ease;
}

.phone:focus-within {
  box-shadow:
    0 0 0 1px rgba(0,212,255,0.15),
    0 40px 100px rgba(0,0,0,0.7),
    0 0 80px rgba(0,212,255,0.08);
}

.wa-top {
  background: var(--wa-header);
  padding: 13px 16px;
  display: flex; align-items: center; gap: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
}

.avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #00b4d8, #00e676);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0; transition: all 0.3s ease;
}

.wa-info { flex: 1; min-width: 0; }

.wa-biz {
  font-size: 15px; font-weight: 600; color: #e9edef;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.wa-live {
  font-size: 11px; color: var(--wa-green);
  display: flex; align-items: center; gap: 5px; margin-top: 1px;
}

.wa-live::before {
  content: '';
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--wa-green); box-shadow: 0 0 4px var(--wa-green);
  animation: blink 2s infinite;
}

.msgs {
  height: 320px; overflow-y: auto;
  padding: 14px 12px;
  display: flex; flex-direction: column; gap: 5px;
  background: var(--wa-bg);
  background-image: url("data:image/svg+xml,%3Csvg width='40' height='40' viewBox='0 0 40 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23ffffff' fill-opacity='0.012'%3E%3Cpath d='M20 20h4v4h-4zM4 4h4v4H4z'/%3E%3C/g%3E%3C/svg%3E");
}

.msgs::-webkit-scrollbar { width: 2px; }
.msgs::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 10px; }

.bubble {
  max-width: 80%; padding: 8px 12px 6px;
  border-radius: 8px;
  font-size: 13.5px; line-height: 1.52;
  color: #e9edef;
  animation: pop 0.25s cubic-bezier(0.34,1.56,0.64,1);
  word-break: break-word;
}

@keyframes pop {
  from { opacity:0; transform: scale(0.94) translateY(6px); }
  to   { opacity:1; transform: scale(1) translateY(0); }
}

.bubble.out { background: var(--wa-out); align-self: flex-end; border-bottom-right-radius: 2px; }
.bubble.in  { background: var(--wa-in);  align-self: flex-start; border-bottom-left-radius: 2px; }

.btime { font-size: 10px; color: rgba(255,255,255,0.35); text-align: right; margin-top: 2px; }

.typing {
  background: var(--wa-in); padding: 10px 14px;
  border-radius: 8px; border-bottom-left-radius: 2px;
  align-self: flex-start; display: none; gap: 4px; align-items: center;
}

.typing.on { display: flex; }

.dot {
  width: 6px; height: 6px; border-radius: 50%;
  background: rgba(255,255,255,0.35); animation: tdot 1.3s infinite;
}
.dot:nth-child(2) { animation-delay: 0.18s; }
.dot:nth-child(3) { animation-delay: 0.36s; }

@keyframes tdot {
  0%,60%,100% { transform: translateY(0); opacity:0.35; }
  30% { transform: translateY(-5px); opacity:1; }
}

.wa-bar {
  background: var(--wa-header); padding: 10px 12px;
  display: flex; align-items: center; gap: 8px;
  border-top: 1px solid rgba(255,255,255,0.04);
}

.wa-inp {
  flex: 1; background: #1e2d38; border: none; border-radius: 20px;
  padding: 9px 15px; color: #e9edef;
  font-family: 'DM Sans', sans-serif; font-size: 14px; outline: none;
}

.wa-inp::placeholder { color: rgba(255,255,255,0.25); }

.send-btn {
  width: 40px; height: 40px; border-radius: 50%;
  background: var(--wa-green); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.18s; flex-shrink: 0;
}

.send-btn:hover { background: #20c05a; transform: scale(1.06); }
.send-btn:active { transform: scale(0.94); }
.send-btn svg { width: 18px; height: 18px; fill: white; }

.qr-wrap {
  width: 100%; max-width: 400px;
  display: flex; flex-wrap: wrap; gap: 6px;
}

.qr {
  padding: 6px 13px; border-radius: 100px;
  border: 1px solid rgba(0,212,255,0.25);
  background: rgba(0,212,255,0.05);
  color: rgba(0,212,255,0.9);
  font-size: 12px; cursor: pointer; transition: all 0.18s;
  font-family: 'DM Sans', sans-serif;
}

.qr:hover { background: rgba(0,212,255,0.12); border-color: var(--accent); }

.bottom-bar {
  display: flex; align-items: center;
  justify-content: space-between;
  width: 100%; max-width: 400px;
}

.reset {
  padding: 6px 14px; border-radius: 100px;
  border: 1px solid var(--border); background: transparent;
  color: var(--text-muted); font-family: 'DM Sans', sans-serif;
  font-size: 12px; cursor: pointer; transition: all 0.18s;
}

.reset:hover { border-color: #3a4a5e; color: var(--text); }

.powered {
  font-size: 11px; color: var(--text-muted);
  opacity: 0.45; display: flex; align-items: center; gap: 5px;
}

footer { font-size: 11px; color: var(--text-muted); opacity: 0.4; text-align: center; }
footer a { color: var(--accent); text-decoration: none; }
</style>
</head>

let cur = 'peluqueria', hist = [], busy = false;

function now() {
  const d = new Date();
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}

function pick(btn) {
  document.querySelectorAll('.s-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  cur = btn.dataset.s;
  reset();
}

function reset() {
  const s = S[cur];
  hist = [];
  document.getElementById('ava').textContent = s.emoji;
  document.getElementById('bizName').textContent = s.name;
  const m = document.getElementById('msgs');
  const t = document.getElementById('typing');
  m.innerHTML = '';
  m.appendChild(t);
  addMsg('in', s.hello);
  const qw = document.getElementById('qrWrap');
  qw.innerHTML = '';
  s.qr.forEach(q => {
    const b = document.createElement('button');
    b.className = 'qr'; b.textContent = q;
    b.onclick = () => { document.getElementById('inp').value = q; send(); };
    qw.appendChild(b);
  });
}

function addMsg(dir, text) {
  const m = document.getElementById('msgs');
  const t = document.getElementById('typing');
  const d = document.createElement('div');
  d.className = `bubble ${dir}`;
  const html = text.replace(/\*(.*?)\*/g, '<strong>$1</strong>');
  d.innerHTML = html + `<div class="btime">${now()}</div>`;
  m.insertBefore(d, t);
  m.scrollTop = m.scrollHeight;
}

function showTyping(v) {
  document.getElementById('typing').className = v ? 'typing on' : 'typing';
  if (v) document.getElementById('msgs').scrollTop = 99999;
}

async function send() {
  if (busy) return;
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  if (!txt) return;
  inp.value = '';
  addMsg('out', txt);
  hist.push({ role: 'user', content: txt });
  busy = true; showTyping(true);
  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: S[cur].sys,
        messages: hist
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 'Disculpa, ha habido un error. Inténtalo de nuevo.';
    hist.push({ role: 'assistant', content: reply });
    await new Promise(r => setTimeout(r, 500 + Math.random() * 400));
    showTyping(false);
    addMsg('in', reply);
  } catch(e) {
    showTyping(false);
    addMsg('in', 'Parece que hay un problema de conexión. Inténtalo en unos segundos 🙏');
  }
  busy = false;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inp').addEventListener('keydown', e => { if (e.key === 'Enter') send(); });
  reset();
});
</script>
</body>
